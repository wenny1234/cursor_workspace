<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ショップ管理 - WMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.3/themes/base/jquery-ui.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/free-jqgrid/4.15.5/css/ui.jqgrid.min.css">
    <link rel="stylesheet" th:href="@{/css/wms.css}">
</head>
<body>
<div id="app" class="app-shell nav-mode-header">
    <header class="app-header">
        <div class="header-brand">WMS Admin</div>
        <nav class="header-nav app-nav" aria-label="ヘッダーメニュー">
            <button class="nav-item active" data-page="dashboard" type="button">売上統計</button>
            <button class="nav-item" data-page="shipping" type="button">出荷処理</button>
            <button class="nav-item" data-page="products" type="button">商品一覧</button>
            <button class="nav-item" data-page="product-form" type="button">商品登録/更新</button>
            <button class="nav-item" data-page="users" type="button">ユーザー一覧</button>
            <button class="nav-item" data-page="user-form" type="button">ユーザー登録/更新</button>
            <button class="nav-item" data-page="orders" type="button">最近の注文履歴</button>
        </nav>
        <div class="header-tools">
            <div class="nav-mode-switch" role="group" aria-label="メニュー表示切替">
                <button type="button" class="nav-mode-btn active" data-nav-mode="header" title="ヘッダーメニュー">ヘッダー</button>
                <button type="button" class="nav-mode-btn" data-nav-mode="sidebar" title="右側メニュー">右メニュー</button>
            </div>
            <form th:action="@{/logout}" method="post" class="header-logout">
                <button type="submit" class="btn btn-outline-light btn-sm">ログアウト</button>
            </form>
        </div>
    </header>

    <div class="app-body">
    <main class="main-content">
        <div class="page-header-bar">
            <h1 id="page-title" class="h4 mb-0">売上統計</h1>
            <div id="toast" class="toast-msg d-none"></div>
        </div>
        <section id="page-dashboard" class="page-panel active">
            <div class="row g-3">
                <div class="col-sm-6 col-xl">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body">
                            <div class="stat-label">売上総額</div>
                            <div id="stat-total-sales" class="stat-value">-</div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body">
                            <div class="stat-label">注文総数</div>
                            <div id="stat-total-orders" class="stat-value">-</div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body">
                            <div class="stat-label">完了注文</div>
                            <div id="stat-completed-orders" class="stat-value">-</div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body">
                            <div class="stat-label">有効商品</div>
                            <div id="stat-active-products" class="stat-value">-</div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body">
                            <div class="stat-label">有効ユーザー</div>
                            <div id="stat-active-users" class="stat-value">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 出荷処理 -->
        <section id="page-shipping" class="page-panel">
            <p class="text-muted mb-3">支払済み注文の送り場所を登録して出荷します</p>
            <ul class="nav nav-tabs mb-3" id="shippingTabs">
                <li class="nav-item">
                    <button class="nav-link active" type="button" data-ship-status="PAID">出荷待ち（支払済）</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" type="button" data-ship-status="SHIPPING">出荷済み（配送中）</button>
                </li>
            </ul>
            <div class="card shadow-sm">
                <div class="card-body">
                    <table id="ordersGrid"></table>
                    <div id="ordersPager"></div>
                </div>
            </div>
        </section>

        <!-- 商品一覧 -->
        <section id="page-products" class="page-panel">
            <div class="toolbar row g-2 align-items-center mb-3">
                <div class="col-md-4">
                    <input id="product-search" type="search" class="form-control" placeholder="商品名/カテゴリ/説明で検索">
                </div>
                <div class="col-auto">
                    <div class="form-check">
                        <input id="product-include-inactive" class="form-check-input" type="checkbox">
                        <label class="form-check-label" for="product-include-inactive">無効商品を表示</label>
                    </div>
                </div>
                <div class="col-auto">
                    <button id="product-search-btn" class="btn btn-primary btn-sm">検索</button>
                    <button id="product-new-btn" class="btn btn-outline-secondary btn-sm">新規商品</button>
                </div>
            </div>
            <div class="table-responsive card shadow-sm">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>画像</th>
                        <th>商品名</th>
                        <th>カテゴリ</th>
                        <th>価格</th>
                        <th>在庫</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="product-table-body"></tbody>
                </table>
            </div>
        </section>

        <!-- 商品登録/更新 -->
        <section id="page-product-form" class="page-panel">
            <form id="product-form" class="card shadow-sm">
                <div class="card-body">
                    <input type="hidden" id="product-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="product-name">商品名</label>
                            <input id="product-name" class="form-control" required maxlength="200">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="product-category">カテゴリ</label>
                            <input id="product-category" class="form-control" maxlength="100">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="product-price">価格</label>
                            <input id="product-price" class="form-control" type="number" step="0.01" min="0.01" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="product-stock">在庫</label>
                            <input id="product-stock" class="form-control" type="number" min="0" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="product-description">商品説明</label>
                            <textarea id="product-description" class="form-control" maxlength="1000" rows="4"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="product-image-url">画像URL</label>
                            <input id="product-image-url" class="form-control" readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="product-image-file">画像アップロード</label>
                            <input id="product-image-file" class="form-control" type="file" accept="image/*">
                        </div>
                        <div class="col-12">
                            <img id="product-image-preview" class="img-preview" alt="商品プレビュー">
                        </div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" id="product-reset-btn" class="btn btn-secondary">リセット</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- ユーザー一覧 -->
        <section id="page-users" class="page-panel">
            <div class="toolbar row g-2 align-items-center mb-3">
                <div class="col-md-4">
                    <input id="user-search" type="search" class="form-control" placeholder="ユーザー名/メールで検索">
                </div>
                <div class="col-auto">
                    <div class="form-check">
                        <input id="user-include-inactive" class="form-check-input" type="checkbox">
                        <label class="form-check-label" for="user-include-inactive">無効ユーザーを表示</label>
                    </div>
                </div>
                <div class="col-auto">
                    <button id="user-search-btn" class="btn btn-primary btn-sm">検索</button>
                    <button id="user-new-btn" class="btn btn-outline-secondary btn-sm">新規ユーザー</button>
                </div>
            </div>
            <div class="table-responsive card shadow-sm">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>ユーザー名</th>
                        <th>メール</th>
                        <th>ロール</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </section>

        <!-- ユーザー登録/更新 -->
        <section id="page-user-form" class="page-panel">
            <form id="user-form" class="card shadow-sm">
                <div class="card-body">
                    <input type="hidden" id="user-id">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="user-username">ユーザー名</label>
                            <input id="user-username" class="form-control" required minlength="3" maxlength="50">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="user-email">メール</label>
                            <input id="user-email" class="form-control" type="email" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="user-role">ロール</label>
                            <select id="user-role" class="form-select" required>
                                <option value="ADMIN">ADMIN</option>
                                <option value="STAFF">STAFF</option>
                                <option value="VIEWER" selected>VIEWER</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="user-password">パスワード <span class="text-muted small">（新規時必須、8〜12桁・3種類混合）</span></label>
                            <input id="user-password" class="form-control" type="password" minlength="8" maxlength="12">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="user-avatar-url">アイコンURL</label>
                            <input id="user-avatar-url" class="form-control" readonly>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="user-avatar-file">アイコンアップロード</label>
                            <input id="user-avatar-file" class="form-control" type="file" accept="image/*">
                        </div>
                        <div class="col-12">
                            <img id="user-avatar-preview" class="img-preview" alt="ユーザープレビュー">
                        </div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" id="user-reset-btn" class="btn btn-secondary">リセット</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- 最近の注文履歴 -->
        <section id="page-orders" class="page-panel">
            <div class="table-responsive card shadow-sm">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>注文番号</th>
                        <th>ユーザー</th>
                        <th>合計金額</th>
                        <th>状態</th>
                        <th>作成日時</th>
                    </tr>
                    </thead>
                    <tbody id="order-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <aside class="sidebar-right" aria-label="右側メニュー">
        <nav class="sidebar-nav app-nav">
            <button class="nav-item active" data-page="dashboard" type="button">売上統計</button>
            <button class="nav-item" data-page="shipping" type="button">出荷処理</button>
            <button class="nav-item" data-page="products" type="button">商品一覧</button>
            <button class="nav-item" data-page="product-form" type="button">商品登録/更新</button>
            <button class="nav-item" data-page="users" type="button">ユーザー一覧</button>
            <button class="nav-item" data-page="user-form" type="button">ユーザー登録/更新</button>
            <button class="nav-item" data-page="orders" type="button">最近の注文履歴</button>
        </nav>
    </aside>
    </div>
</div>

<!-- 出荷モーダル -->
<div class="modal fade" id="shipModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">出荷登録</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted" id="shipOrderNumber"></p>
                <div id="shipModalError" class="alert alert-danger d-none"></div>
                <label class="form-label" for="shippingAddress">送り場所</label>
                <textarea id="shippingAddress" class="form-control" rows="3" placeholder="例: 東京都千代田区 1-2-3" required></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                <button type="button" class="btn btn-primary" id="btnConfirmShip">出荷済みにする</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.3/jquery-ui.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/free-jqgrid/4.15.5/jquery.jqgrid.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/free-jqgrid/4.15.5/i18n/grid.locale-ja.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
