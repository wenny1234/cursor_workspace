<section class="page">
  <h1>プロフィール</h1>
  <p class="subtitle">アカウント情報（サンプル）</p>

  <div class="card">
    <strong>ユーザー名</strong>
    <div>example@example.com</div>
  </div>

  <div class="card">
    <strong>配送先</strong>
    <div>東京都サンプル区 1-2-3</div>
  </div>

  <button class="primary-btn" type="button" (click)="onLogout()">
    ログアウト
  </button>

  <button
    class="primary-btn"
    type="button"
    (click)="onTestAuthRequiredApi()"
    style="margin-top: 10px;"
  >
    認証テスト（/api/products/stats）
  </button>

  <div *ngIf="testResult" class="card" role="status" style="margin-top: 10px;">
    {{ testResult }}
  </div>
</section>
