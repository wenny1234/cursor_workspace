server:
  port: 8081

spring:
  application:
    name: admin-shop-manage
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:oracle}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

app:
  images-dir: ${IMAGES_DIR:../data/images}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.shop.admin.model
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.shop.admin: DEBUG
