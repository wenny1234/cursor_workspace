server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: shop-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:csv}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:shop-management-secret-key-2024-change-in-production}
    expiration: 86400000 # 24 hours in milliseconds
    refresh-expiration: 604800000 # 7 days in milliseconds
  csv:
    data-dir: ${CSV_DATA_DIR:../data/csv}
    images-dir: ${IMAGES_DIR:../data/images}
  security:
    allowed-origins: http://localhost:4200,http://localhost:3000

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

logging:
  level:
    com.shop.backend: DEBUG
    org.springframework.security: INFO
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/shop-backend.log